<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ITS Ticket Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl">
        <h1 class="text-3xl font-bold text-center text-blue-700 mb-6">ITS Ticket Classifier</h1>
        
        <form method="post" action="/predict">
            <label for="short_description" class="block text-gray-700 font-medium mb-2">Enter ticket short description:</label>
            <textarea id="short_description" name="short_description" rows="1"
                        class="w-full p-4 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="Enter your ticket here..." autocomplete="off">{{ short_description or '' }}</textarea>
            <label for="description" class="block text-gray-700 font-medium mb-2">Enter your ticket description:</label>
            <textarea id="description" name="description" rows="8"
                      class="w-full p-4 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                      placeholder="Enter your descrition here..." autocomplete="off">{{ description or '' }}</textarea>

            <div class="mt-4 flex justify-between items-center">
                <div class="mt-4 flex justify-between items-center gap-4">
                    <button type="submit"
                            class="bg-blue-600 text-white py-2 px-6 rounded-lg hover:bg-blue-700 transition">
                        Classify
                    </button>
                    <a href="/"
                       class="inline-block bg-gray-300 text-gray-800 py-2 px-6 rounded-lg hover:bg-gray-400 transition text-center">
                        Reset
                    </a>
                </div>
            </div>
        </form>

        {% if prediction %}
        <div class="mt-6">
            <h2 class="text-lg font-semibold text-green-700 mb-2">Top Predicted Assignment Groups:</h2>
            <div class="flex flex-wrap gap-2">
                {% for label in prediction %}
                    <span class="bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm font-medium shadow">
                        {{ label }}
                    </span>
                {% endfor %}
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
